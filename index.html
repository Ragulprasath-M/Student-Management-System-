<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management system</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>STUDENT MANAGEMENT SYSTEM</h1>

        <label>Name</label>
        <input type="text"  id="name" placeholder="Enter the Name">
        <label>Reg Num</label>
        <input type="number" id="reg" placeholder="Enter the Register Number">
        <label>Marks</label>
        <input type="number"  id="marks" placeholder="Enter the Marks">
        <label>Department</label>
        <input type="text"  id="dept" placeholder="Enter the Department">
        <label>Age</label>
        <input type="number"  id="age" placeholder="Enter the Age"><br>
        <label>Address</label>
        <input type="text"  id="address" placeholder="Enter the Address">
        <label>Mob No</label>
        <input type="number" id="mob" placeholder="Enter the Mobile Number">
      
        
        <button onclick="addStudent()">Add Student</button> 

        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Register Number</th>
                <th>Marks</th>
                <th>Department</th>
                <th>Age</th>
                <th>Address</th>
                <th>Mobile Number</th>
                <th>Action</th>
                 </tr>
            </thead>
                    <tbody id="studentList"></tbody>
        </table>

    </div>
    <script src="script.js"></script>

</body>
</html>
